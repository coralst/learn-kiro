name: Delete merged branch

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}" || echo "Branch already deleted"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
