name: Auto-merge

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only auto-merge when the review approves (not on REQUEST_CHANGES or COMMENT)
    if: github.event.review.state == 'approved'
    steps:
      - name: Enable auto-merge (requires all status checks to pass first)
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
